name: UAT & Visual Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Build & Test (against local build) ──────────────────────────────────────
  uat-local:
    name: UAT – Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Build Next.js app
        run: npm run build
        env:
          # Stub env vars so the build succeeds without real secrets
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'stub' }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL || 'test@example.com' }}

      - name: Start app & run UAT tests
        run: |
          npx next start &
          npx wait-on http://localhost:3000 --timeout 30000
          BASE_URL=http://localhost:3000 npx playwright test --project="Desktop Chrome" --project="Mobile iPhone" --project="Tablet"
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-local
          path: playwright-report/
          retention-days: 14

  # ── Production smoke test (runs after deploy, on main only) ─────────────────
  uat-production:
    name: UAT – Production Smoke Test
    runs-on: ubuntu-latest
    needs: uat-local
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for Vercel deployment
        run: sleep 45

      - name: Run smoke tests against production
        run: npx playwright test --project="Desktop Chrome" --project="Mobile iPhone"
        env:
          CI: true
          BASE_URL: ${{ secrets.PRODUCTION_URL || 'https://speedup-dev.vercel.app' }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-production
          path: playwright-report/
          retention-days: 14

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Production UAT failed! Check the Playwright report artifact."
